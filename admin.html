<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Anmol Chandiok — Work Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0e; --panel:#101016; --panel-2:#16161d; --sunk:#0c0c11;
    --line:#22222c; --line-hi:#32323f;
    --text:#e9e9ef; --dim:#8a8a99; --faint:#5c5c69;
    --accent:#fb5607; --accent-soft:rgba(251,86,7,.14);
    --live:#3ddc97; --warn:#ffb454; --bad:#ff6b6b;
    --r:10px;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font:400 14px/1.5 Inter,system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button,input,select,textarea{font:inherit;color:inherit}
  button{cursor:pointer}
  a{color:var(--accent)}
  /* ---- shell ---- */
  .shell{display:flex;flex-direction:column;min-height:100vh}
  .top{
    display:flex;align-items:center;gap:14px;
    padding:12px 18px;border-bottom:1px solid var(--line);
    background:var(--panel);position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:-.01em}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none}
  .brand small{color:var(--faint);font-weight:400;font-size:12px;margin-left:2px}
  .spacer{flex:1}
  .pill{
    display:flex;align-items:center;gap:8px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:999px;
    padding:6px 13px;font-size:12.5px;color:var(--dim);
    font-family:var(--mono);
  }
  .pill:hover{border-color:var(--line-hi);color:var(--text)}
  .pill .led{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .pill.on .led{background:var(--live);box-shadow:0 0 0 3px rgba(61,220,151,.16)}
  /* ---- buttons ---- */
  .btn{
    border:1px solid var(--line-hi);background:var(--panel-2);color:var(--text);
    border-radius:8px;padding:8px 14px;font-size:13.5px;font-weight:500;
    transition:background .16s,border-color .16s,opacity .16s;
  }
  .btn:hover{background:#1e1e27;border-color:#40404f}
  .btn:disabled{opacity:.42;cursor:not-allowed}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#ff7a33;border-color:#ff7a33}
  .btn.ghost{background:transparent;border-color:var(--line)}
  .btn.danger{color:var(--bad);border-color:#3a2226;background:transparent}
  .btn.danger:hover{background:#2a1519;border-color:#5a2b32}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  /* ---- add bar ---- */
  .add{
    display:flex;gap:10px;padding:16px 18px;
    border-bottom:1px solid var(--line);background:var(--sunk);
  }
  .add input{
    flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:11px 14px;font-family:var(--mono);font-size:13px;
  }
  .add input:focus{border-color:var(--accent);outline:none}
  .add input::placeholder{color:var(--faint);font-family:Inter,sans-serif}
  /* ---- body ---- */
  .body{display:grid;grid-template-columns:minmax(300px,380px) 1fr;flex:1;min-height:0}
  .bin{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .bin__head{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-bottom:1px solid var(--line);
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;
  }
  .bin__list{overflow:auto;padding:8px;flex:1}
  .row{
    display:flex;align-items:center;gap:11px;padding:8px;border-radius:9px;
    border:1px solid transparent;cursor:pointer;transition:background .13s,border-color .13s;
  }
  .row:hover{background:var(--panel-2)}
  .row.sel{background:var(--accent-soft);border-color:rgba(251,86,7,.42)}
  .row.dragging{opacity:.35}
  .row.over{border-color:var(--accent)}
  .row__n{
    font-family:var(--mono);font-size:11px;color:var(--faint);width:20px;flex:none;
    text-align:right;font-variant-numeric:tabular-nums;
  }
  .row__thumb{
    width:62px;height:35px;flex:none;border-radius:5px;object-fit:cover;
    background:#000;border:1px solid var(--line);
  }
  .row[data-aspect="9:16"] .row__thumb{width:22px;height:35px}
  .row__txt{min-width:0;flex:1}
  .row__title{
    font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .row__meta{
    font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;
  }
  .row__flags{display:flex;gap:4px;flex:none}
  .flag{
    font-size:9px;letter-spacing:.06em;font-weight:600;text-transform:uppercase;
    padding:2px 5px;border-radius:4px;
  }
  .flag.f{background:rgba(251,86,7,.2);color:#ffb089}
  .flag.h{background:#26262e;color:var(--faint)}
  .row__grip{color:#3a3a47;cursor:grab;flex:none;padding:2px}
  .row__grip:active{cursor:grabbing}
  /* ---- inspector ---- */
  .insp{overflow:auto;padding:24px;min-height:0}
  .insp__inner{max-width:640px;margin:0 auto}
  .empty{
    height:100%;display:grid;place-content:center;justify-items:center;gap:12px;
    text-align:center;color:var(--faint);padding:40px;
  }
  .empty h2{margin:0;font-size:16px;color:var(--dim);font-weight:600}
  .empty p{margin:0;font-size:13.5px;max-width:340px;line-height:1.6}
  .card{
    border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#000;
    aspect-ratio:16/9;position:relative;margin-bottom:22px;
  }
  .card[data-aspect="9:16"]{aspect-ratio:9/16;max-width:280px}
  .card[data-aspect="1:1"]{aspect-ratio:1/1;max-width:420px}
  .card[data-aspect="4:5"]{aspect-ratio:4/5;max-width:340px}
  .card img,.card video,.card iframe{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border:0}
  .card__tag{
    position:absolute;left:10px;bottom:10px;z-index:2;
    font-family:var(--mono);font-size:10.5px;color:#fff;
    background:rgba(8,8,12,.7);padding:4px 7px;border-radius:5px;
    backdrop-filter:blur(6px);
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .f{margin-bottom:14px}
  .f label{
    display:block;font-size:11px;letter-spacing:.07em;text-transform:uppercase;
    color:var(--faint);font-weight:600;margin-bottom:6px;
  }
  .f input,.f select{
    width:100%;background:var(--sunk);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:13.5px;
  }
  .f input:focus,.f select:focus{border-color:var(--accent);outline:none}
  .f .hint{font-size:11.5px;color:var(--faint);margin-top:5px;line-height:1.5}
  .f .mono{font-family:var(--mono);font-size:12.5px}
  .switches{display:flex;gap:10px;margin:18px 0 22px}
  .sw{
    display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:8px;
    border:1px solid var(--line);background:var(--sunk);font-size:13px;color:var(--dim);
  }
  .sw input{accent-color:var(--accent);width:15px;height:15px}
  .sw:has(input:checked){border-color:var(--accent);color:var(--text);background:var(--accent-soft)}
  .sec{
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
    font-weight:600;margin:26px 0 14px;padding-top:20px;border-top:1px solid var(--line);
  }
  /* ---- footer ---- */
  .foot{
    display:flex;align-items:center;gap:10px;padding:12px 18px;
    border-top:1px solid var(--line);background:var(--panel);
    position:sticky;bottom:0;z-index:20;

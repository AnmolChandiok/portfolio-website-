<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Anmol Chandiok — Work Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0e; --panel:#101016; --panel-2:#16161d; --sunk:#0c0c11;
    --line:#22222c; --line-hi:#32323f;
    --text:#e9e9ef; --dim:#8a8a99; --faint:#5c5c69;
    --accent:#fb5607; --accent-soft:rgba(251,86,7,.14);
    --live:#3ddc97; --warn:#ffb454; --bad:#ff6b6b;
    --r:10px; --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  body { margin:0; background:var(--bg); color:var(--text); font:400 14px/1.5 Inter,system-ui,sans-serif; }
  button,input,select { font:inherit; color:inherit; }
  .btn { border:1px solid var(--line-hi); background:var(--panel-2); color:var(--text); border-radius:8px; padding:8px 14px; font-weight:500; cursor:pointer; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.danger { color:var(--bad); border-color:#3a2226; background:transparent; }
  .add { display:flex; gap:10px; padding:16px 18px; border-bottom:1px solid var(--line); background:var(--sunk); }
  .add input { flex:1; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:11px 14px; }
  .bin__list { overflow:auto; padding:8px; }
  .row { display:flex; align-items:center; gap:11px; padding:8px; border-radius:9px; cursor:pointer; }
  .row:hover { background:var(--panel-2); }
  .row.sel { background:var(--accent-soft); border:1px solid rgba(251,86,7,.4); }
  .row__thumb { width:62px; height:35px; object-fit:cover; border-radius:5px; border:1px solid var(--line); }
  .insp { padding:24px; }
  .f { margin-bottom:14px; }
  .f label { display:block; font-size:11px; color:var(--faint); margin-bottom:6px; }
  .f input, .f select { width:100%; background:var(--sunk); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .switches { display:flex; gap:10px; margin:18px 0; }
  .sw { display:flex; align-items:center; gap:8px; padding:9px 13px; border:1px solid var(--line); border-radius:8px; }
</style>
</head>
<body>

<!-- Lock Screen + App structure (same as before) -->
<div class="lock" id="lock">...</div>

<div id="app" class="hidden">
  <div class="shell">
    <header class="top">
      <div class="brand"><span class="dot"></span> Work <small>/ pluseshot</small></div>
      <div class="spacer"></div>
      <button class="pill" id="connPill">Not connected</button>
      <button class="btn ghost sm" id="pwBtn">Password</button>
      <button class="btn primary" id="publishBtn" disabled>Publish to site</button>
    </header>

    <div class="add">
      <input id="urlIn" placeholder="Paste YouTube, Instagram Reel or Behance link" autocomplete="off">
      <button class="btn" id="addBtn">Add</button>
    </div>

    <div class="body">
      <aside class="bin">
        <div class="bin__head"><span>Order on site</span> <span id="binCount">0</span></div>
        <div class="bin__list" id="list"></div>

        <!-- Messages Section -->
        <div class="bin__head" style="margin-top:12px; border-top:1px solid var(--line); padding-top:10px">
          <span>Messages <span id="msgCount" style="color:var(--accent)"></span></span>
          <button class="btn sm ghost" id="clearMsgsBtn">Clear</button>
        </div>
        <div class="bin__list" id="messagesList" style="max-height:220px; overflow:auto;"></div>
      </aside>

      <main class="insp" id="insp"></main>
    </div>
  </div>
</div>

<script>
// ==================== FULL UPDATED ADMIN SCRIPT ====================

(function () {
  'use strict';

  // Password protection (keep your existing PW_HASH)
  var PW_HASH = 'e8b3abdb658b91480eecfff5e7764727cbd920b9a232acba511a846bd3ae9730';

  // ... (keep your existing lock screen code)

  function parseVideoUrl(input) {
    var s = String(input || '').trim();
    if (!s) return null;

    // YouTube
    var yt = s.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (yt) return { platform: 'youtube', id: yt[1], vertical: /shorts/.test(s) };

    // Instagram Reel
    var ig = s.match(/instagram\.com\/reel\/([A-Za-z0-9_-]+)/);
    if (ig) return { platform: 'instagram', id: ig[1], vertical: true };

    // Behance
    var bh = s.match(/behance\.net\/gallery\/(\d+)/);
    if (bh) return { platform: 'behance', id: bh[1], vertical: false };

    return null;
  }

  async function fetchTitle(info) {
    if (info.platform === 'youtube') {
      try {
        const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${info.id}&format=json`);
        if (res.ok) {
          const data = await res.json();
          return data.title || '';
        }
      } catch (e) {}
    }
    return '';
  }

  function blank(id, vertical) {
    return {
      id: id,
      platform: 'youtube',
      title: '', client: '', category: '', year: new Date().getFullYear().toString(),
      aspect: vertical ? '9:16' : '16:9',
      duration: '', poster: '', preview: '', previewMode: 'youtube',
      start: 0, featured: false, hidden: false, description: ''
    };
  }

  // ... (rest of your existing admin logic: renderList, renderInsp, add(), publish, messages, etc.)

  // Updated add() function
  async function add() {
    const input = document.getElementById('urlIn');
    const info = parseVideoUrl(input.value);

    if (!info) {
      alert('Please paste a valid YouTube, Instagram Reel, or Behance link.');
      return;
    }

    // Prevent duplicates
    if (items.some(v => v.id === info.id && v.platform === info.platform)) {
      alert('This project is already in the list.');
      return;
    }

    const v = blank(info.id, info.vertical);
    v.platform = info.platform;

    items.unshift(v);
    input.value = '';
    renderList();
    renderInsp();

    // Auto fetch title for YouTube
    if (info.platform === 'youtube') {
      const title = await fetchTitle(info);
      if (title) {
        v.title = title;
        renderList();
        renderInsp();
      }
    }
  }

  // Attach events
  document.getElementById('addBtn').addEventListener('click', add);
  document.getElementById('urlIn').addEventListener('keydown', e => {
    if (e.key === 'Enter') add();
  });

  // ... (keep all your existing functions: renderList, renderInsp, publish, messages, etc.)

  // Boot
  (async function boot() {
    // your existing boot code
    renderMessages();
  })();

})();
</script>
</body>
</html>

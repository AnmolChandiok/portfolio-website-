<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Work — Anmol Chandiok</title>

<!-- 1 of 3 — the stylesheet -->
<link rel="stylesheet" href="css/work.css">

<style>
  /* Your site's own look. The grid inherits from these variables,
     so it picks up whatever palette the rest of the page already uses. */
  :root{
    --pw-accent: #7c5cff;   /* swap for your violet */
    --pw-text:   #e9e9ef;
    --pw-muted:  #8c8c99;
    --pw-radius: 14px;
  }
  body{
    margin:0; background:#0a0a0e; color:var(--pw-text);
    font-family:Inter,system-ui,sans-serif;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:80px 24px 120px}
  h1{font-size:clamp(30px,5vw,46px);margin:0 0 8px;letter-spacing:-.02em}
  .lede{color:var(--pw-muted);margin:0 0 44px;max-width:52ch;line-height:1.6}
</style>
</head>
<body>

<main class="wrap">
  <h1>Selected work</h1>
  <p class="lede">Motion design, brand films and short-form for builders and studios across Delhi NCR.</p>

  <!-- 2 of 3 — the two containers. That is the whole integration. -->
  <div class="pw-filters" data-work-filters></div>
  <div class="pw-grid" data-work-grid data-src="data/videos.json"></div>
</main>

<!-- 3 of 3 — the script -->
<script src="js/work.js" defer></script>

</body>
</html>
